<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps Mini-PaaS</title>

    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: Segoe UI, Tahoma;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 420px;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(to right, #60a5fa, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 15px
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            opacity: .9
        }

        .oauth-btn {
            background: #111827;
            border: 1px solid #374151;
            margin-top: 8px;
        }

        #deploy-ui {
            display: none
        }

        #status-card {
            margin-top: 20px;
            padding: 12px;
            border-left: 4px solid var(--primary);
            display: none;
        }

        .small {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🚀 CloudOps Mini-PaaS</h1>

        <!-- AUTH UI -->
        <div id="auth-ui">

            <div class="form-group">
                <input id="email" placeholder="Email">
            </div>

            <div class="form-group">
                <input id="password" type="password" placeholder="Password">
            </div>

            <button onclick="login()">Sign In</button>

            <button onclick="register()">Sign Up</button>

            <button class="oauth-btn">Continue with Google</button>
            <button class="oauth-btn">Continue with GitHub</button>

        </div>

        <!-- DEPLOY UI -->
        <div id="deploy-ui">

            <form id="deployForm">

                <div class="form-group">
                    <input id="repo_url" placeholder="https://github.com/user/repo">
                </div>

                <div class="form-group">
                    <input id="name" placeholder="Application Name">
                </div>

                <div class="form-group">
                    <input id="port" type="number" placeholder="External Port">
                </div>

                <button type="submit">Launch Instance</button>

            </form>

            <button onclick="logout()" style="background:#ef4444;margin-top:15px">Logout</button>

            <div id="status-card">
                <div id="status-text">Deploying...</div>
            </div>

        </div>

    </div>

    <script>

        /* --------------------------
        CHECK LOGIN STATE
        ---------------------------*/

        const token = localStorage.getItem("token")

        if (token) {
            showDeployUI()
        } else {
            showAuthUI()
        }

        function showDeployUI() {
            document.getElementById("auth-ui").style.display = "none"
            document.getElementById("deploy-ui").style.display = "block"
        }

        function showAuthUI() {
            document.getElementById("auth-ui").style.display = "block"
            document.getElementById("deploy-ui").style.display = "none"
        }

        /* --------------------------
        REGISTER
        ---------------------------*/

        async function register() {

            const email = document.getElementById("email").value
            const password = document.getElementById("password").value

            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            })

            const data = await res.json()

            alert(data.message || data.detail)

        }

        /* --------------------------
        LOGIN
        ---------------------------*/

        async function login() {

            const email = document.getElementById("email").value
            const password = document.getElementById("password").value

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            })

            const data = await res.json()

            if (data.access_token) {

                localStorage.setItem("token", data.access_token)

                showDeployUI()

            } else {
                alert(data.detail || "Login failed")
            }

        }

        /* --------------------------
        LOGOUT
        ---------------------------*/

        function logout() {
            localStorage.removeItem("token")
            location.reload()
        }

        /* --------------------------
        DEPLOY
        ---------------------------*/

        document.getElementById("deployForm").addEventListener("submit", async function (e) {

            e.preventDefault()

            const statusCard = document.getElementById("status-card")
            const statusText = document.getElementById("status-text")

            statusCard.style.display = "block"
            statusText.innerText = "Deploying..."

            const data = {
                repo_url: document.getElementById("repo_url").value,
                name: document.getElementById("name").value,
                port: parseInt(document.getElementById("port").value)
            }

            const res = await fetch("/deploy", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify(data)
            })

            const result = await res.json()

            if (res.ok) {
                statusText.innerHTML = `✅ Deployment started<br>ID: ${result.project_id}`
            } else {
                statusText.innerHTML = `❌ ${result.detail || "Deployment failed"}`
            }

        })

    </script>

</body>

</html>

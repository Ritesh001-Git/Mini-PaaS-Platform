<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps Mini-PaaS</title>

    <!-- Clerk -->
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="YOUR_PUBLISHABLE_KEY"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        #deploy-ui { display: none; }
    </style>
</head>

<body>

<div class="container">

    <h2>🚀 Mini PaaS</h2>

    <!-- Clerk Auth -->
    <div id="auth"></div>

    <!-- Deploy UI -->
    <div id="deploy-ui">

        <input id="repo_url" placeholder="Repo URL">
        <input id="name" placeholder="App Name">
        <input id="port" type="number" placeholder="Port">

        <button onclick="deploy()">Deploy</button>
        <button onclick="logout()">Logout</button>

        <div id="status"></div>

    </div>

</div>

<script>

    let clerk;

    window.addEventListener("load", async () => {

        clerk = window.Clerk;
        await clerk.load();

        if (clerk.user) {
            showDeploy();
        } else {
            clerk.mountSignIn(document.getElementById("auth"));
        }
    });

    function showDeploy() {
        document.getElementById("auth").style.display = "none";
        document.getElementById("deploy-ui").style.display = "block";
    }

    async function logout() {
        await clerk.signOut();
        location.reload();
    }

    async function deploy() {

        const token = await clerk.session.getToken();

        const data = {
            repo_url: document.getElementById("repo_url").value,
            name: document.getElementById("name").value,
            port: parseInt(document.getElementById("port").value)
        };

        const res = await fetch("/deploy", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            document.getElementById("status").innerText =
                "Deployment started: " + result.project_id;
            poll(result.project_id);
        } else {
            document.getElementById("status").innerText =
                result.detail || "Error";
        }
    }

    async function poll(id) {

        const interval = setInterval(async () => {

            const res = await fetch(`/deployment-status/${id}`);
            const data = await res.json();

            if (data.status === "RUNNING") {
                clearInterval(interval);

                document.getElementById("status").innerHTML = `
                ✅ Running <br>
                URL: ${data.url}
                `;
            }

            if (data.status === "FAILED") {
                clearInterval(interval);
                document.getElementById("status").innerText = "❌ Failed";
            }

        }, 3000);
    }

</script>

</body>
</html>

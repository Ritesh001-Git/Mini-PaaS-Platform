<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps Mini-PaaS</title>

    <!-- Clerk -->
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_Y2VydGFpbi1zZWFob3JzZS0yMy5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://cdn.clerk.dev/clerk.js">
        </script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        #deploy-ui {
            display: none;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>🚀 Mini PaaS</h2>

        <!-- Clerk Auth -->
        <div id="auth"></div>

        <!-- Deploy UI -->
        <div id="deploy-ui">

            <input id="repo_url" placeholder="https://github.com/user/repo">
            <input id="name" placeholder="App Name (e.g. my-app)">
            <input id="port" type="number" placeholder="Port (e.g. 3000)">

            <button onclick="deploy()">Deploy</button>
            <button onclick="logout()" style="background:red">Logout</button>

            <div id="status"></div>

        </div>

    </div>

    <script>

        let clerk;

        window.addEventListener("load", async () => {

            const clerk = window.Clerk;

            if (!clerk) {
                console.error("Clerk failed to load");
                return;
            }

            await clerk.load();

            if (clerk.user) {
                showDeploy();
            } else {
                clerk.mountSignIn(document.getElementById("auth"));
            }
        });

        function showDeploy() {
            document.getElementById("auth").style.display = "none";
            document.getElementById("deploy-ui").style.display = "block";
        }

        async function logout() {
            await clerk.signOut();
            location.reload();
        }

        async function deploy() {

            const repo = document.getElementById("repo_url").value;
            const name = document.getElementById("name").value;
            const port = parseInt(document.getElementById("port").value);

            if (!repo || !name || !port) {
                alert("Please fill all fields");
                return;
            }

            const token = await clerk.session.getToken();

            const res = await fetch("/deploy", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    repo_url: repo,
                    name: name,
                    port: port
                })
            });

            const result = await res.json();

            const statusDiv = document.getElementById("status");

            if (res.ok) {
                statusDiv.innerHTML = `⏳ Deployment started (ID: ${result.project_id})`;
                poll(result.project_id);
            } else {
                statusDiv.innerHTML = `❌ ${result.detail || "Error"}`;
            }
        }

        async function poll(id) {

            const interval = setInterval(async () => {

                const res = await fetch(`/deployment-status/${id}`);
                const data = await res.json();

                const statusDiv = document.getElementById("status");

                if (data.status === "RUNNING") {
                    clearInterval(interval);

                    statusDiv.innerHTML = `
                ✅ Deployment Successful <br><br>
                🌐 URL: <a href="${data.url}" target="_blank">${data.url}</a>
                `;
                }

                if (data.status === "FAILED") {
                    clearInterval(interval);
                    statusDiv.innerHTML = "❌ Deployment Failed";
                }

            }, 3000);
        }

    </script>

</body>

</html>
